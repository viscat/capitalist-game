name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una sola desplegament alhora.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build i desplegament
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Disponibles per al pas de notificació; el seu `if` els consulta per saltar-lo si no hi són.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Activa GitHub Pages (mode "GitHub Actions") si encara no ho està.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      # Avís per correu quan el desplegament a producció acaba correctament.
      # Cal configurar els secrets del repositori MAIL_USERNAME i MAIL_PASSWORD (per a Gmail,
      # una "app password"). Si no hi són, el pas se salta i el desplegament no falla.
      - name: Notifica per correu
        if: ${{ success() && env.MAIL_USERNAME != '' && env.MAIL_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Capitalist Game CI <${{ secrets.MAIL_USERNAME }}>
          to: viscat88@gmail.com
          subject: "✅ Capitalist Game desplegat a producció"
          body: |
            Nou desplegament de Capitalist Game a GitHub Pages.

            Commit: ${{ github.sha }}
            Missatge: ${{ github.event.head_commit.message }}
            URL: ${{ steps.deployment.outputs.page_url }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
