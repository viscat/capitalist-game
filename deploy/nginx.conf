# Servir Capitalist Game (SPA estàtica) amb nginx.
# Vàlid tant per a un contenidor LXC (a /etc/nginx/conf.d/) com per a la imatge
# oficial de nginx (Docker). El joc desa l'estat al navegador (localStorage): no
# cal backend ni base de dades.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/capitalist-game;
    index index.html;

    # Compressió dels recursos de text.
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Els assets de Vite porten un hash al nom de fitxer: es poden cachejar molt.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # No és una SPA amb rutes, però el fallback a index.html fa el servei robust.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
